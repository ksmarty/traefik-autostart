name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (leave empty to auto-increment)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read current version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(cat VERSION)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create git tag
        run: |
          git tag -f v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }} --force-with-lease

      - name: Create plugin tarball
        run: |
          tar -czf plugin.tar.gz middleware.go .traefik.yml go.mod

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: plugin.tar.gz
          allow_override: true

      - name: Update version
        if: github.event.inputs.version == ''
        run: |
          VERSION=${{ steps.version.outputs.version }}
          parts=(${VERSION//./ })
          MAJOR=${parts[0]}
          MINOR=${parts[1]}
          PATCH=${parts[2]}
          NEW_VERSION="$MAJOR.$((MINOR+1)).$PATCH"
          echo $NEW_VERSION > VERSION
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add VERSION
          git commit -m "Bump version to $NEW_VERSION"
          git push