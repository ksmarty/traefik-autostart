<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traefik Autostart Controller</title>
  <script src="https://cdn.twind.style" crossorigin></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<!--
  Alpine auto-calls init() when it finds a method with that name in x-data.
  Do NOT add x-init="init()" — it would cause a double-initialisation, firing
  two fetchAll() calls and opening two SSE connections.
-->
<body class="bg-gray-900 text-gray-100 min-h-screen" x-data="app()" x-cloak>

  <!-- Nav -->
  <nav class="bg-gray-800 border-b border-gray-700 px-6 h-14 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <svg class="h-6 w-6 text-blue-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
      </svg>
      <span class="font-semibold">Traefik Autostart Controller</span>
    </div>
    <div class="flex items-center gap-4 text-sm text-gray-400">
      <span>
        SSE:&nbsp;
        <!--
          Use inline :style instead of :class for the connected indicator.
          twind scans the static HTML for class names to generate CSS; class names
          that only appear inside Alpine `:class` expressions may be missed,
          causing the colour to never render. Inline styles bypass twind entirely.
        -->
        <span
          :style="connected ? 'color:#4ade80' : 'color:#f87171'"
          x-text="connected ? 'connected' : 'disconnected'">
        </span>
      </span>
    </div>
  </nav>

  <!-- Main -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Loading state -->
    <template x-if="loading">
      <div class="flex items-center justify-center py-24 text-gray-500">
        <svg class="animate-spin h-6 w-6 mr-3 text-blue-400" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        Loading containers…
      </div>
    </template>

    <template x-if="!loading">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Containers table -->
        <div class="lg:col-span-2 bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">

          <!-- Card header -->
          <div class="px-6 py-4 border-b border-gray-700 flex items-center justify-between">
            <h2 class="font-semibold">Managed Containers</h2>
            <span class="text-sm text-gray-400"
              x-text="containers.length + ' container' + (containers.length !== 1 ? 's' : '')"></span>
          </div>

          <!-- Bulk action bar — visible when one or more containers are selected -->
          <template x-if="selected.length > 0">
            <div class="px-6 py-2.5 bg-blue-950/40 border-b border-gray-700 flex items-center gap-5 text-sm">
              <span class="text-blue-300" x-text="selected.length + ' selected'"></span>
              <button @click="stopSelected()"
                class="text-red-400 hover:text-red-300 transition-colors">
                Stop selected
              </button>
              <button @click="selected = []"
                class="text-gray-400 hover:text-gray-300 transition-colors">
                Clear
              </button>
            </div>
          </template>

          <template x-if="containers.length === 0">
            <div class="px-6 py-10 text-center text-gray-500 text-sm">
              No managed containers found.<br>
              Add <code class="bg-gray-700 px-1.5 py-0.5 rounded text-gray-300 text-xs">autostart.enable=true</code>
              or <code class="bg-gray-700 px-1.5 py-0.5 rounded text-gray-300 text-xs">autostart.group=&lt;name&gt;</code>
              to your container labels.
            </div>
          </template>

          <template x-if="containers.length > 0">
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead>
                  <tr class="text-left text-xs font-medium text-gray-400 uppercase tracking-wider border-b border-gray-700">
                    <!-- Select-all checkbox -->
                    <th class="pl-4 pr-2 py-3 w-8">
                      <input type="checkbox"
                        :checked="allSelected"
                        :indeterminate.prop="someSelected && !allSelected"
                        @change="toggleSelectAll()"
                        class="rounded border-gray-600 bg-gray-700 cursor-pointer">
                    </th>
                     <th class="px-6 py-3">Container</th>
                    <th class="px-6 py-3">Status</th>
                    <th class="px-6 py-3">Stop Delay</th>
                    <th class="px-6 py-3">Last Request</th>
                    <th class="px-6 py-3 text-right">Actions</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-700">
                  <template x-for="c in containers" :key="c.name">
                    <tr class="hover:bg-gray-750 transition-colors"
                      :class="isSelected(c.name) ? 'bg-blue-950/20' : ''">

                      <!-- Row checkbox -->
                      <td class="pl-4 pr-2 py-3.5">
                        <input type="checkbox"
                          :checked="isSelected(c.name)"
                          @change="toggleSelect(c.name)"
                          class="rounded border-gray-600 bg-gray-700 cursor-pointer">
                      </td>

                      <!-- Name + group badge -->
                      <td class="px-6 py-3.5">
                        <div class="font-medium text-gray-200" x-text="c.name"></div>
                        <div class="mt-0.5" x-show="c.group">
                          <span
                            class="inline-flex items-center px-1.5 py-0.5 rounded text-xs bg-blue-900/50 text-blue-300"
                            x-text="'group: ' + c.group"></span>
                        </div>
                      </td>

                      <!-- Status — combines Docker status + health into one badge.
                           Uses inline :style for colours so twind never needs to
                           generate CSS for dynamically bound class names (which it
                           may miss, causing the wrong colour after SSE updates). -->
                      <td class="px-6 py-3.5">
                        <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-semibold"
                          :style="statusBadgeStyle(c)">
                          <span class="w-1.5 h-1.5 rounded-full" :style="dotStyle(c)"></span>
                          <span x-text="displayStatus(c)"></span>
                        </span>
                      </td>

                      <!-- Stop delay -->
                      <td class="px-6 py-3.5 text-gray-400" x-text="c.stop_delay"></td>

                      <!-- Last request — relative time, never negative -->
                      <td class="px-6 py-3.5 text-gray-400">
                        <template x-if="c.last_request">
                          <span x-text="relativeTime(c.last_request)"></span>
                        </template>
                        <template x-if="!c.last_request">
                          <span class="text-gray-600">Never</span>
                        </template>
                      </td>

                      <!-- Actions -->
                      <td class="px-6 py-3.5 text-right space-x-3">
                        <button @click="startContainer(c.name)"
                          :disabled="c.status === 'running' || c.status === 'starting'"
                          class="text-green-400 hover:text-green-300 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                          Start
                        </button>
                        <button @click="stopContainer(c.name)"
                          :disabled="c.status !== 'running'"
                          class="text-red-400 hover:text-red-300 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">
                          Stop
                        </button>
                      </td>

                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </template>
        </div>

        <!-- Right column -->
        <div class="space-y-6">

          <!-- Stats -->
          <div class="grid grid-cols-2 gap-3">
            <div class="bg-gray-800 rounded-xl border border-gray-700 p-4">
              <div class="text-2xl font-bold text-green-400" x-text="runningCount"></div>
              <div class="text-xs text-gray-400 mt-0.5">Running</div>
            </div>
            <div class="bg-gray-800 rounded-xl border border-gray-700 p-4">
              <div class="text-2xl font-bold text-gray-400" x-text="stoppedCount"></div>
              <div class="text-xs text-gray-400 mt-0.5">Stopped</div>
            </div>
          </div>

          <!-- Groups — only shown when at least one container belongs to a group -->
          <template x-if="groups.length > 0">
            <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
              <div class="px-5 py-3.5 border-b border-gray-700">
                <h2 class="font-semibold text-sm">Groups</h2>
              </div>
              <div class="divide-y divide-gray-700/50">
                <template x-for="group in groups" :key="group">
                  <div class="px-5 py-3 flex items-center justify-between">
                    <div>
                      <span class="text-sm text-gray-200" x-text="group"></span>
                      <span class="text-xs text-gray-500 ml-2"
                        x-text="containers.filter(c => c.group === group).length + ' containers'"></span>
                    </div>
                    <button @click="stopGroup(group)"
                      class="text-xs text-red-400 hover:text-red-300 transition-colors">
                      Stop all
                    </button>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Event log -->
          <div class="bg-gray-800 rounded-xl border border-gray-700 overflow-hidden">
            <div class="px-5 py-3.5 border-b border-gray-700 flex items-center justify-between">
              <h2 class="font-semibold text-sm">Event Log</h2>
              <span class="text-xs text-gray-500" x-text="events.length + ' events'"></span>
            </div>
            <div class="divide-y divide-gray-700/50 max-h-96 overflow-y-auto">
              <template x-if="events.length === 0">
                <div class="px-5 py-6 text-center text-gray-600 text-sm">No events yet</div>
              </template>
              <template x-for="(ev, i) in events" :key="i">
                <div class="px-5 py-2.5 flex items-start gap-3">
                  <span class="mt-1.5 shrink-0 w-2 h-2 rounded-full"
                    :class="{
                      'bg-blue-400':   ev.type === 'starting',
                      'bg-green-400':  ev.type === 'ready' || ev.type === 'manual_start',
                      'bg-red-400':    ev.type === 'auto_stop' || ev.type === 'manual_stop',
                      'bg-yellow-400': ev.type === 'error'
                    }">
                  </span>
                  <div class="min-w-0">
                    <p class="text-sm text-gray-300 truncate" x-text="ev.message"></p>
                    <p class="text-xs text-gray-600 mt-0.5" x-text="relativeTime(ev.timestamp)"></p>
                  </div>
                </div>
              </template>
            </div>
          </div>

        </div>
      </div>
    </template>
  </main>

  <script>
    function app() {
      // Store the EventSource outside Alpine's reactive scope.
      // Alpine v3 wraps every property of the returned object in a JavaScript Proxy to
      // track reactivity. If EventSource were stored as this._sse, Alpine would return a
      // Proxy(EventSource) on access. Setting .onopen / .onmessage on that Proxy may not
      // correctly delegate to the underlying object's event handler slots, so the callbacks
      // never fire. A plain closure variable is invisible to Alpine and never proxied.
      let _sse = null;

      return {
        containers: [],
        events:     [],
        connected:  false,
        loading:    true,
        selected:   [],   // names of currently selected containers

        get runningCount() { return this.containers.filter(c => c.status === 'running').length; },
        get stoppedCount() { return this.containers.filter(c => c.status !== 'running').length; },
        get allSelected()  { return this.containers.length > 0 && this.selected.length === this.containers.length; },
        get someSelected() { return this.selected.length > 0; },

        // Unique sorted list of group names across all managed containers.
        get groups() {
          return [...new Set(this.containers.map(c => c.group).filter(Boolean))].sort();
        },

        // ── Status badge helpers ──────────────────────────────────────────────
        // All colours use inline :style (not :class) so twind never needs to
        // generate CSS for these values dynamically — it can miss class names that
        // only appear inside Alpine expressions, which causes the wrong colour
        // after SSE-driven data updates.

        // Colour palette (matched to Tailwind dark-theme equivalents):
        //   green  — bg-green-900/60  text-green-300  dot green-400
        //   yellow — bg-yellow-900/60 text-yellow-300 dot yellow-400
        //   orange — bg-orange-900/60 text-orange-300 dot orange-400  (unhealthy)
        //   red    — bg-red-900/60    text-red-300    dot red-400

        _statusTier(c) {
          const s = c.status, h = c.health;
          if (s === 'running') {
            if (!h || h === s || h === 'healthy') return 'green';
            if (h === 'unhealthy')                return 'orange';
            /* h === 'starting' */                return 'yellow';
          }
          if (s === 'starting' || s === 'created') return 'yellow';
          return 'red';
        },

        statusBadgeStyle(c) {
          const t = this._statusTier(c);
          if (t === 'green')  return 'background:rgba(20,83,45,0.6);color:rgb(134,239,172)';
          if (t === 'yellow') return 'background:rgba(113,63,18,0.6);color:rgb(252,211,77)';
          if (t === 'orange') return 'background:rgba(124,45,18,0.6);color:rgb(253,186,116)';
          /* red */           return 'background:rgba(127,29,29,0.6);color:rgb(252,165,165)';
        },

        dotStyle(c) {
          const t = this._statusTier(c);
          if (t === 'green')  return 'background:rgb(74,222,128)';
          if (t === 'yellow') return 'background:rgb(250,204,21)';
          if (t === 'orange') return 'background:rgb(251,146,60)';
          /* red */           return 'background:rgb(248,113,113)';
        },

        // Returns a combined status string like Portainer:
        //   running              → "running"
        //   running + healthy    → "running"
        //   running + unhealthy  → "running (unhealthy)"
        //   running + starting   → "running (starting)"
        //   anything else        → Docker status as-is
        displayStatus(c) {
          const s = c.status, h = c.health;
          if (s === 'running' && h && h !== s && h !== 'healthy') return `running (${h})`;
          return s;
        },

        isSelected(name) {
          return this.selected.includes(name);
        },

        toggleSelect(name) {
          const idx = this.selected.indexOf(name);
          if (idx >= 0) this.selected.splice(idx, 1);
          else          this.selected.push(name);
        },

        toggleSelectAll() {
          this.selected = this.allSelected ? [] : this.containers.map(c => c.name);
        },

        // Alpine calls init() automatically — do NOT add x-init="init()" to the element.
        async init() {
          // Show the spinner only during the initial page load.
          // Background refreshes (SSE reconnect) update containers in place
          // without touching this flag, so the table never flashes or unmounts.
          this.loading = true;
          try {
            await Promise.all([this.fetchAll(), this.fetchHistory()]);
          } finally {
            this.loading = false;
          }
          this.connectSSE();
          // No setInterval — the backend pushes "sync" events every 10 s via SSE,
          // so the frontend never needs to poll.
        },

        // Full container list. Does NOT touch this.loading — only init() does that,
        // ensuring background refreshes never cause a flash or DOM tear-down.
        async fetchAll() {
          try {
            const res = await fetch('/containers');
            if (res.ok) {
              this.containers = await res.json();
            }
          } catch (e) {
            console.error('fetchAll failed:', e);
          }
        },

        // Load recent event history so the log isn't empty on page open.
        // 'request' events are excluded — they fire on every proxied hit and clutter the log.
        async fetchHistory() {
          try {
            const res = await fetch('/events/history');
            if (res.ok) {
              const history = await res.json();
              this.events = history
                .filter(e => e.type !== 'request')
                .reverse()
                .map(e => ({ ...e, timestamp: e.timestamp || new Date().toISOString() }));
            }
          } catch (e) {
            console.error('fetchHistory failed:', e);
          }
        },

        // Targeted single-container fetch — triggered by state-changing SSE events.
        async fetchOne(name) {
          try {
            const res = await fetch(`/containers/${encodeURIComponent(name)}`);
            if (!res.ok) return;
            const updated = await res.json();
            const idx = this.containers.findIndex(c => c.name === name);
            if (idx >= 0) {
              this.containers.splice(idx, 1, updated); // splice triggers Alpine reactivity
            } else {
              this.containers.push(updated);
            }
          } catch (e) {
            console.error('fetchOne failed:', name, e);
          }
        },

        connectSSE() {
          if (_sse) _sse.close();

          // Use the closure variable directly — NOT this._sse — so Alpine never proxies it.
          _sse = new EventSource('/events');

          // onopen fires as soon as the HTTP connection is established, before any data.
          _sse.onopen = () => { this.connected = true; };

          _sse.onmessage = (e) => {
            let data;
            try { data = JSON.parse(e.data); } catch { return; }

            // Keepalive pings — just confirm the connection is alive.
            if (data.type === 'ping') {
              this.connected = true;
              return;
            }

            // 'sync' events carry the full container list pushed by the server
            // every 10 s. Replace the array in place so Alpine diffs the rows.
            if (data.type === 'sync' && Array.isArray(data.containers)) {
              this.containers = data.containers;
              return;
            }

            // 'request' events fire on every proxied HTTP request.
            // They don't change container state and clutter the log — skip them.
            if (data.type !== 'request') {
              this.events.unshift({ ...data, timestamp: data.timestamp || new Date().toISOString() });
              if (this.events.length > 100) this.events.length = 100;
            }

            // State-changing events carry the updated container dict inline.
            // Apply it directly — no extra HTTP round-trip needed.
            const stateEvents = ['starting', 'ready', 'auto_stop', 'manual_start', 'manual_stop', 'error'];
            if (data.container && stateEvents.includes(data.type)) {
              if (data.state) {
                const idx = this.containers.findIndex(c => c.name === data.container);
                if (idx >= 0) {
                  this.containers.splice(idx, 1, data.state);
                } else {
                  this.containers.push(data.state);
                }
              } else {
                // Fallback: fetch from API if the event doesn't include state.
                this.fetchOne(data.container);
              }
            }
          };

          _sse.onerror = () => {
            this.connected = false;
            _sse.close();
            // Re-sync the full container list on reconnect so that any state changes
            // that occurred while SSE was down are reflected immediately.
            setTimeout(() => {
              this.fetchAll().then(() => this.connectSSE());
            }, 5000);
          };
        },

        async startContainer(name) {
          await fetch(`/containers/${encodeURIComponent(name)}/start`, { method: 'POST' });
        },

        async stopContainer(name) {
          await fetch(`/containers/${encodeURIComponent(name)}/stop`, { method: 'POST' });
        },

        // Stop all currently selected containers, then clear the selection.
        async stopSelected() {
          const toStop = [...this.selected];
          this.selected = [];
          await Promise.all(toStop.map(name => this.stopContainer(name)));
        },

        // Stop every running container that belongs to the given group.
        async stopGroup(group) {
          await fetch(`/groups/${encodeURIComponent(group)}/stop`, { method: 'POST' });
        },

        // Returns a human-readable relative time string.
        // Clamps to "just now" for future timestamps (e.g. clock skew).
        relativeTime(iso) {
          if (!iso) return '';
          const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
          if (diff < 5)    return 'just now';
          if (diff < 60)   return diff + 's ago';
          if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
          return Math.floor(diff / 3600) + 'h ago';
        },
      };
    }
  </script>
</body>
</html>
